<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #vanta-bg {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
    }

    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      color: #00ffe7;
      font-family: 'Courier New', Courier, monospace;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #00ffe7;
      text-shadow:
        0 0 6px #00ffe7,
        0 0 20px #00ffe7,
        0 0 50px #00cfff,
        0 0 100px #7b00ff;
      margin-bottom: 1rem;
    }

    p {
      font-size: clamp(0.8rem, 2vw, 1rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #ff00c8;
      text-shadow:
        0 0 6px #ff00c8,
        0 0 20px #ff00c8,
        0 0 40px #7b00ff;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="vanta-bg"></div>
  <div class="content">
    <h1>Hello, World</h1>
    <p>Built with Vanta.js</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanta/0.5.24/vanta.net.min.js"></script>
  <script>
    VANTA.NET({
      el: '#vanta-bg',
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0x00ffe7,
      backgroundColor: 0x04000f,
      points: 14.00,
      maxDistance: 22.00,
      spacing: 18.00
    });
  </script>
</body>
</html>
