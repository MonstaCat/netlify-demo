    // ─── DEPLOY PAGE ───
    function DeployPage(p) {
      var cfg = useState(loadDeployConfig()), c = cfg[0], setC = cfg[1];
      var log = useState(loadDeployLog()), logs = log[0], setLogs = log[1];
      var ps = useState('idle'), pushState = ps[0], setPushState = ps[1]; // idle | pushing | ok | err
      var ms = useState(''), pushMsg = ms[0], setPushMsg = ms[1];
      var cf = useState(false), confirmOpen = cf[0], setConfirmOpen = cf[1];
      var tts = useState(null), toast = tts[0], setToast = tts[1];

      var updateCfg = function(k, v) {
        var n = Object.assign({}, c); n[k] = v; setC(n); saveDeployConfig(n);
      };

      var normalizeUrl = function(u) {
        if (!u) return '';
        u = u.trim().replace(/\/+$/, '');
        if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
        return u;
      };

      var buildPayload = function() {
        return {
          products: p.products,
          variations: p.variations,
          users: p.users,
          pushedAt: new Date().toISOString(),
          source: 'Stackless Console v4'
        };
      };

      var doPush = function() {
        setConfirmOpen(false);
        var url = normalizeUrl(c.siteUrl);
        if (!url) { setPushState('err'); setPushMsg('Site URL is required'); return; }
        if (!c.secret) { setPushState('err'); setPushMsg('Shared secret is required'); return; }
        setPushState('pushing'); setPushMsg('Connecting to ' + url + '...');

        var payload = buildPayload();
        var endpoint = url + '/wp-json/stackless/v1/sync';
        var started = Date.now();

        fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Stackless-Token': c.secret
          },
          body: JSON.stringify(payload)
        }).then(function(res) {
          return res.text().then(function(txt) {
            var data = null;
            try { data = JSON.parse(txt); } catch(e) {}
            var elapsed = Date.now() - started;
            if (!res.ok) {
              var msg = (data && data.message) ? data.message : ('HTTP ' + res.status + ' ' + res.statusText);
              throw new Error(msg);
            }
            var applied = data && data.applied ? data.applied : {};
            setPushState('ok');
            setPushMsg('Deployed in ' + elapsed + 'ms · ' + (applied.products || p.products.length) + ' products, ' + (applied.users || Object.keys(p.users).length) + ' users');
            var entry = {
              at: new Date().toISOString(),
              ok: true,
              elapsed: elapsed,
              products: p.products.length,
              users: Object.keys(p.users).length,
              variations: p.variations.length,
              message: 'Deployed successfully'
            };
            appendDeployLog(entry);
            setLogs(loadDeployLog());
            var newCfg = Object.assign({}, c, {lastPushAt: entry.at, lastPushResult: 'ok'});
            setC(newCfg); saveDeployConfig(newCfg);
            setToast('Pushed to ' + url);
            setTimeout(function(){setToast(null);}, 3000);
          });
        }).catch(function(err) {
          var elapsed = Date.now() - started;
          var msg = err && err.message ? err.message : 'Network error';
          setPushState('err');
          setPushMsg(msg);
          var entry = {
            at: new Date().toISOString(),
            ok: false,
            elapsed: elapsed,
            products: p.products.length,
            users: Object.keys(p.users).length,
            variations: p.variations.length,
            message: msg
          };
          appendDeployLog(entry);
          setLogs(loadDeployLog());
          var newCfg = Object.assign({}, c, {lastPushAt: entry.at, lastPushResult: 'err'});
          setC(newCfg); saveDeployConfig(newCfg);
        });
      };

      var doTest = function() {
        var url = normalizeUrl(c.siteUrl);
        if (!url) { setPushState('err'); setPushMsg('Site URL is required'); return; }
        if (!c.secret) { setPushState('err'); setPushMsg('Shared secret is required'); return; }
        setPushState('pushing'); setPushMsg('Testing ' + url + '...');
        fetch(url + '/wp-json/stackless/v1/status', {
          method: 'GET',
          headers: {'X-Stackless-Token': c.secret}
        }).then(function(res) {
          return res.text().then(function(txt) {
            var data = null; try { data = JSON.parse(txt); } catch(e) {}
            if (!res.ok) {
              var msg = (data && data.message) ? data.message : ('HTTP ' + res.status);
              throw new Error(msg);
            }
            setPushState('ok');
            var v = data && data.plugin_version ? ' · plugin v' + data.plugin_version : '';
            var last = data && data.last_sync_at ? ' · last synced ' + new Date(data.last_sync_at).toLocaleString() : ' · no data yet';
            setPushMsg('Connected' + v + last);
          });
        }).catch(function(err) {
          setPushState('err');
          setPushMsg(err && err.message ? err.message : 'Connection failed');
        });
      };

      var clearLog = function() {
        if (confirm('Clear the deploy history?')) {
          try { localStorage.removeItem(DEPLOY_LOG_KEY); } catch(e){}
          setLogs([]);
        }
      };

      var payloadSize = JSON.stringify(buildPayload()).length;
      var configured = !!(c.siteUrl && c.secret);

      return h(Fragment, null,
        h('div', {className:'deploy-wrap'},

          h('div', {className:'deploy-card'},
            h('div', {className:'deploy-hd'},
              h('div', null,
                h('div', {className:'deploy-title'}, 'Connection'),
                h('div', {className:'deploy-sub'}, 'Where Stackless pushes data. Requires the Stackless Connector plugin installed on the site.')
              ),
              h('div', {className:'deploy-status ' + (configured?'ok':'wait')}, configured?'Configured':'Not configured')
            ),
            h('div', {className:'fld'},
              h('label', {className:'fld-l'}, 'Site URL'),
              h('input', {className:'fld-i', value:c.siteUrl, placeholder:'https://alfadisplay.no', onChange:function(e){updateCfg('siteUrl', e.target.value);}})
            ),
            h('div', {className:'fld'},
              h('label', {className:'fld-l'}, 'Shared Secret'),
              h('input', {className:'fld-i', type:'password', value:c.secret, placeholder:'Paste the token you set in the plugin', onChange:function(e){updateCfg('secret', e.target.value);}})
            ),
            h('div', {className:'deploy-row'},
              h('button', {className:'btn-f btn-ghost', style:{width:'auto',padding:'8px 16px'}, onClick:doTest, disabled:pushState==='pushing'}, pushState==='pushing'?'Testing...':'Test Connection'),
              h('div', {style:{flex:1}}),
              h('div', {className:'deploy-meta'}, 'Payload: ' + (payloadSize/1024).toFixed(1) + ' KB · ' + p.products.length + ' products · ' + Object.keys(p.users).length + ' users')
            ),
            pushState !== 'idle' ? h('div', {className:'deploy-msg ' + pushState},
              pushState==='pushing' ? '⟳ ' : pushState==='ok' ? '✓ ' : '⚠ ',
              pushMsg
            ) : null
          ),

    function CustomerViewPage(p) {
      var prods = p.products, vars = p.variations, users = p.users;
      var entries = Object.entries(users).sort(function(a,b){ return (a[1].name||'').localeCompare(b[1].name||''); });

      var us = useState(entries.length ? entries[0][0] : ''), selUid = us[0], setSelUid = us[1];
      var ss = useState(''), search = ss[0], setSearch = ss[1];
      var vs = useState('products'), viewTab = vs[0], setViewTab = vs[1];
      var cs = useState(null), copied = cs[0], setCopied = cs[1];

      var user = users[selUid] || null;

      // Map category keys to CATS display names and discount values
      var catKeys = {display:'display', produktmerking:'produktmerking', led:'led', nokkel:'nokkel', bil:'bil'};
      var catLabels = {display:'Display', produktmerking:'Produktmerking', led:'LED Produkter', nokkel:'Nøkkelmerking', bil:'Bil'};

      // Guess which category a product belongs to (simple heuristic from name/url)
      var guessCategory = function(prod) {
        var name = (prod.name || '').toLowerCase();
        var url = (prod.url || '').toLowerCase();
        // Check known product groups
        var cg = typeof CATEGORY_GROUPS !== 'undefined' ? CATEGORY_GROUPS : {};
        var keys = Object.keys(cg);
        for (var k = 0; k < keys.length; k++) {
          var catSlug = keys[k];
          var slugs = cg[catSlug];
          for (var s = 0; s < slugs.length; s++) {
            if (url.indexOf(slugs[s]) >= 0 || name.indexOf(slugs[s]) >= 0) {
              // Map slug to CATS key
              if (catSlug === 'display') return 'display';
              if (catSlug === 'produktmerking') return 'produktmerking';
              if (catSlug === 'led-produkter') return 'led';
              if (catSlug === 'na-kkelmerking') return 'nokkel';
              if (catSlug === 'bil') return 'bil';
            }
          }
        }
        // Fallback heuristics
        if (/led/i.test(name)) return 'led';
        if (/bil|dekk|isskrap/i.test(name)) return 'bil';
        if (/nøkkel|nokkel|nøkk/i.test(name)) return 'nokkel';
        if (/merke|dome|chrome|3d/i.test(name)) return 'produktmerking';
        return 'display'; // default category
      };

      // Calculate customer prices
      var computeCustomerPrices = function(items) {
        if (!user) return items.map(function(item){ return {product:item, discount:0, cat:null, prices:[]}; });
        return items.map(function(item) {
          var cat = guessCategory(item);
          var discountPct = user[cat] || 0;
          var discountMul = 1 - (discountPct / 100);
          var baseCustomer = Math.round(item.basePrice * discountMul * 100) / 100;
          var tiers = item.bulkPrices.map(function(bp) {
            return { qty: bp.qty, original: bp.price, customer: Math.round(bp.price * discountMul * 100) / 100 };
          });
          return { product:item, discount:discountPct, cat:cat, customerBase:baseCustomer, tiers:tiers };
        });
      };

      var items = viewTab === 'products' ? prods : vars;
      var sl = search.toLowerCase();
      var filtered = items.filter(function(x) {
        return !search || (x.name && x.name.toLowerCase().indexOf(sl) >= 0) || String(x.id).indexOf(search) >= 0;
      });
      var customerPrices = computeCustomerPrices(filtered);

      // Stats
      var totalSavings = 0;
      var totalOriginal = 0;
      customerPrices.forEach(function(cp) {
        totalOriginal += cp.product.basePrice;
        totalSavings += cp.product.basePrice - (cp.customerBase || cp.product.basePrice);
      });
      var avgDiscount = totalOriginal > 0 ? ((totalSavings / totalOriginal) * 100).toFixed(1) : '0';

      // Generate shareable text
      var genPriceSheet = function() {
        if (!user) return '';
        var lines = ['PRISARK / PRICE SHEET', 'Customer: ' + (user.name || '#'+selUid), 'Email: ' + (user.email || '—'), 'Generated: ' + new Date().toLocaleDateString(), ''];
        lines.push('Discounts: Display ' + (user.display||0) + '% / Produktmerking ' + (user.produktmerking||0) + '% / LED ' + (user.led||0) + '% / Nøkkelmerking ' + (user.nokkel||0) + '% / Bil ' + (user.bil||0) + '%');
        lines.push('');
        lines.push(padRight('Product', 42) + padRight('Your Price', 14) + padRight('Savings', 10) + 'Tier Prices');
        lines.push('─'.repeat(90));
        customerPrices.forEach(function(cp) {
          var saving = cp.product.basePrice > 0 ? ('-' + cp.discount + '%') : '—';
          var tierStr = cp.tiers.map(function(t){ return t.qty + '+: kr ' + t.customer.toFixed(0); }).join(', ');
          lines.push(padRight(truncate(cp.product.name || '#'+cp.product.id, 40), 42) + padRight('kr ' + (cp.customerBase||0).toFixed(2), 14) + padRight(saving, 10) + tierStr);
        });
        lines.push('');
        lines.push('Total products: ' + customerPrices.length + ' | Avg discount: ' + avgDiscount + '%');
        return lines.join('\n');
      };

      var copySheet = function() {
        var txt = genPriceSheet();
        if (navigator.clipboard) { navigator.clipboard.writeText(txt).then(function(){setCopied(true);setTimeout(function(){setCopied(null);},2500);}); }
      };

      var downloadCSV = function() {
        if (!user) return;
        var rows = [['Product ID','Product Name','Category','Base Price (kr)','Your Price (kr)','Discount %'].concat(
          (customerPrices.length > 0 && customerPrices[0].tiers.length > 0) ?
            customerPrices.reduce(function(maxT, cp){ return cp.tiers.length > maxT.length ? cp.tiers : maxT; }, []).map(function(t,i){ return 'Tier '+(i+1)+' Qty'; }).concat(
              customerPrices.reduce(function(maxT, cp){ return cp.tiers.length > maxT.length ? cp.tiers : maxT; }, []).map(function(t,i){ return 'Tier '+(i+1)+' Price (kr)'; })
            ) : []
        )];
        customerPrices.forEach(function(cp) {
          var row = [cp.product.id, '"'+(cp.product.name||'')+'"', catLabels[cp.cat]||cp.cat, cp.product.basePrice.toFixed(2), (cp.customerBase||0).toFixed(2), cp.discount];
          var maxTiers = customerPrices.reduce(function(mx, c){ return c.tiers.length > mx ? c.tiers.length : mx; }, 0);
          for(var i=0;i<maxTiers;i++){
            row.push(cp.tiers[i] ? cp.tiers[i].qty : '');
          }
          for(var i=0;i<maxTiers;i++){
            row.push(cp.tiers[i] ? cp.tiers[i].customer.toFixed(2) : '');
          }
          rows.push(row);
        });
        var csv = rows.map(function(r){return r.join(',');}).join('\n');
        var blob = new Blob([csv], {type:'text/csv'});
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = 'prices-' + (user.name||selUid).replace(/\s+/g,'-').toLowerCase() + '-' + new Date().toISOString().slice(0,10) + '.csv';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      return h(Fragment, null,

            h('select', {className:'cv-select', value:selUid, onChange:function(e){setSelUid(e.target.value);}},
              !entries.length ? h('option', {value:''}, 'No users configured') : null,
              entries.map(function(e){
                return h('option', {key:e[0], value:e[0]}, (e[1].name || 'User #'+e[0]) + ' (#' + e[0] + ')');
              })
            ),
            user ? h('div', {className:'cv-user-card'},
              h('div', {className:'cv-user-avatar'}, (user.name||'?').charAt(0).toUpperCase()),
              h('div', {className:'cv-user-info'},
                h('div', {className:'cv-user-name'}, user.name || 'Unnamed'),
                h('div', {className:'cv-user-email'}, user.email || '—'),
                h('div', {className:'cv-user-id'}, '#' + selUid)
              )
            ) : null,
            user ? h('div', {className:'cv-discounts'},
              h('div', {className:'cv-disc-title'}, 'Category Discounts'),
              Object.entries(catLabels).map(function(e) {
                var k = e[0], lb = e[1], v = user[k] || 0;
                return h('div', {key:k, className:'cv-disc-row'},
                  h('span', {className:'cv-disc-label'}, lb),
                  h('div', {className:'cv-disc-bar-wrap'},
                    h('div', {className:'cv-disc-bar', style:{width:Math.min(v,100)+'%', background: v >= 30 ? 'var(--green)' : v >= 10 ? 'var(--accent)' : 'var(--text4)'}})
                  ),
                  h('span', {className:'cv-disc-val ' + (v>=30?'high':v>=10?'med':'low')}, v + '%')
                );
              })
            ) : null,
            user ? h('div', {className:'cv-actions'},
              h('button', {className:'btn-f btn-ghost cv-action-btn', onClick:downloadCSV}, '↓ Download CSV'),
              h('button', {className:'btn-f btn-ghost cv-action-btn', onClick:copySheet}, copied ? '✓ Copied!' : '⎘ Copy Price Sheet')
            ) : null
          ),

          h('div', {className:'cv-main'},
            h('div', {className:'cv-bar'},
              h('input', {className:'srch', placeholder:'Search products...', value:search, onChange:function(e){setSearch(e.target.value);}}),
              h('div', {className:'pills'},
                h('button', {className:'pill'+(viewTab==='products'?' on':''), onClick:function(){setViewTab('products');}}, 'Products ('+prods.length+')'),
                h('button', {className:'pill'+(viewTab==='variations'?' on':''), onClick:function(){setViewTab('variations');}}, 'Variations ('+vars.length+')')
              ),

    function padRight(s, n) { s = s || ''; while(s.length < n) s += ' '; return s; }
    function truncate(s, n) { return s.length > n ? s.slice(0,n-1)+'…' : s; }

    // ─── PERSISTENCE ───
    var STORAGE_KEY = 'stackless_alfadisplay_v4';
    var DEPLOY_KEY = 'stackless_deploy_config_v4';
    var DEPLOY_LOG_KEY = 'stackless_deploy_log_v4';

    function loadSaved() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          // Fallback: migrate from v3 or v2 if present
          var prev = localStorage.getItem('stackless_alfadisplay_v3') || localStorage.getItem('stackless_alfadisplay_v2');
          if (prev) { localStorage.setItem(STORAGE_KEY, prev); raw = prev; }
        }
        if (!raw) return null;
        var d = JSON.parse(raw);
        if (d && d.products && d.variations && d.users && d.savedAt) return d;
        return null;
      } catch(e) { return null; }
    }

    function saveToStorage(prods, vars, users) {
      try {
        var d = {
          products: prods,
          variations: vars,
          users: users,
          savedAt: new Date().toISOString(),
          version: 4
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
        return true;
      } catch(e) { return false; }
    }

    function clearSaved() {
      try { localStorage.removeItem(STORAGE_KEY); return true; } catch(e) { return false; }
    }

    function loadDeployConfig() {
      try {
        var raw = localStorage.getItem(DEPLOY_KEY);
        if (!raw) return {siteUrl:'', secret:'', lastPushAt:null, lastPushResult:null};
        return JSON.parse(raw);
      } catch(e) { return {siteUrl:'', secret:'', lastPushAt:null, lastPushResult:null}; }
    }
    function saveDeployConfig(cfg) {
      try { localStorage.setItem(DEPLOY_KEY, JSON.stringify(cfg)); return true; } catch(e) { return false; }
    }
    function loadDeployLog() {
      try {
        var raw = localStorage.getItem(DEPLOY_LOG_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch(e) { return []; }
    }
    function appendDeployLog(entry) {
      try {
        var log = loadDeployLog();
        log.unshift(entry);
        if (log.length > 30) log = log.slice(0, 30);
        localStorage.setItem(DEPLOY_LOG_KEY, JSON.stringify(log));
        return true;
      } catch(e) { return false; }
    }

    function exportJSON(prods, vars, users) {
      var d = {
        products: prods,
        variations: vars,
        users: users,
        exportedAt: new Date().toISOString(),
        source: 'Stackless Alfadisplay Console v4'
      };
      var blob = new Blob([JSON.stringify(d, null, 2)], {type:'application/json'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = 'stackless-data-' + new Date().toISOString().slice(0,10) + '.json';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function downloadConnectorPlugin() {
      var phpSource = document.getElementById('connector-php-source').textContent;
      if (typeof JSZip === 'undefined') {
        // Fallback: download raw PHP
        var blob = new Blob([phpSource], {type:'application/x-php'});
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a'); a.href = url; a.download = 'stackless-connector.php';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
        return;
      }
      var zip = new JSZip();
      zip.folder('stackless-connector').file('stackless-connector.php', phpSource);
      zip.generateAsync({type:'blob'}).then(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a'); a.href = url; a.download = 'stackless-connector.zip';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });
    }

    function importJSON(file, cb) {
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var d = JSON.parse(e.target.result);
          if (d.products && d.variations && d.users) {
            cb(null, d);
          } else {
            cb('Invalid format: missing products, variations, or users');
          }
        } catch(err) { cb('Failed to parse JSON: ' + err.message); }
      };
      reader.readAsText(file);
    }

    // ─── APP ───
    function App() {
      var saved = useMemo(function(){ return loadSaved(); }, []);
      var ps = useState('overview'), page = ps[0], setPage = ps[1];
      var prs = useState(saved ? saved.products : PRODUCTS.slice()), prods = prs[0], setProds = prs[1];
      var vrs = useState(saved ? saved.variations : VARIATIONS.slice()), vars = vrs[0], setVars = vrs[1];
      var urs = useState(saved ? saved.users : Object.assign({}, USERS)), users = urs[0], setUsers = urs[1];
      var cmds = useState(false), showCmd = cmds[0], setShowCmd = cmds[1];
      var srch = useState(''), initSearch = srch[0], setInitSearch = srch[1];
      var svs = useState(saved ? saved.savedAt : null), lastSaved = svs[0], setLastSaved = svs[1];
      var dms = useState(false), showDataMgr = dms[0], setShowDataMgr = dms[1];
      var wbs = useState(function(){ try { return localStorage.getItem('stackless_welcome_dismissed_v4') !== '1'; } catch(e) { return true; } });
      var showWelcome = wbs[0], setShowWelcome = wbs[1];
      var dismissWelcome = function(){ try { localStorage.setItem('stackless_welcome_dismissed_v4','1'); } catch(e){} setShowWelcome(false); };

      // Auto-save whenever data changes
      var saveTimer = useRef(null);
      useEffect(function() {
        if (saveTimer.current) clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(function() {
          var ok = saveToStorage(prods, vars, users);
          if (ok) setLastSaved(new Date().toISOString());
        }, 500); // debounce 500ms
        return function(){ if(saveTimer.current) clearTimeout(saveTimer.current); };
      }, [prods, vars, users]);

      // Keyboard shortcut
      useEffect(function() {
        var handler = function(e) {
          if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
            e.preventDefault(); setShowCmd(function(s){return !s;});
          }
          if (e.key === 'Escape') setShowCmd(false);
        };
        document.addEventListener('keydown', handler);
        return function(){ document.removeEventListener('keydown', handler); };
      }, []);

      var navs = [
        {id:'overview', icon:'◎', label:'Overview'},
        {id:'pricing', icon:'◆', label:'Pricing'},
        {id:'users', icon:'◉', label:'Users'},
        {id:'customer', icon:'👤', label:'Customer View'},
        {id:'deploy', icon:'⤴', label:'Deploy'},
        {id:'export', icon:'↗', label:'Export PHP'},
      ];
      var titles = {overview:'Overview',pricing:'Bulk Pricing',users:'User Discounts',customer:'Customer View',deploy:'Deploy to Site',export:'Export PHP'};

      var handleCmdSelect = function(pg, search) {
        setPage(pg);
        setInitSearch(search || '');
        setShowCmd(false);
      };

      return h('div', {className:'shell'},
        h('div', {className:'nav'},
          h('div', {className:'nav-brand'}, 'S'),
          navs.map(function(n) {
            return h('button', {key:n.id, className:'nav-btn'+(page===n.id?' active':''), onClick:function(){setPage(n.id);setInitSearch('');}},
              n.icon,
              h('div', {className:'nav-tooltip'}, n.label)
            );
          }),
          h('div', {className:'nav-spacer'}),
          h('div', {className:'nav-sep'}),
          h('button', {className:'nav-btn', onClick:function(){setShowDataMgr(true);}, title:'Data'},
            '\u2630',
            h('div', {className:'nav-tooltip'}, 'Data / Backup')
          ),
          h('button', {className:'nav-btn', onClick:function(){setShowCmd(true);}, title:'Search'},
            '\u2315',
            h('div', {className:'nav-tooltip'}, '\u2318K Search')
          )
        ),
        h('div', {className:'main'},
          h('div', {className:'header'},
            h('div', {className:'h-site'}, h('span', {style:{fontFamily:"'Space Grotesk',sans-serif",fontWeight:600,letterSpacing:'-0.03em'}}, 'Stackless'), h('span', {className:'v-badge'}, 'v4'), h('span', {style:{color:'var(--text4)',margin:'0 8px',fontWeight:300}}, '/'), 'alfadisplay.no'),
            h('div', {className:'h-dot'}),
            h('div', {className:'h-page'}, titles[page]),
            h('div', {className:'h-right'},
              h('div', {className:'h-kbd', onClick:function(){setShowCmd(true);}},
                h('kbd', null, '⌘'), h('kbd', null, 'K'), ' Search'
              ),
              lastSaved ? h('div', {className:'save-indicator saved', title:'Last saved: ' + new Date(lastSaved).toLocaleString(), onClick:function(){setShowDataMgr(true);}},
                h('span', {className:'save-dot'}), 'Saved'
              ) : h('div', {className:'save-indicator unsaved'}, h('span', {className:'save-dot'}), 'Not saved'),
              h('div', {className:'h-badge'}, prods.length + ' products · ' + Object.keys(users).length + ' users'),
              h('div', {className:'h-avatar'}, 'S')
            )
          ),
          showWelcome ? h('div', {className:'welcome-banner'},
            h('div', {className:'welcome-icon'}, '👋'),
            h('div', {className:'welcome-body'},
              h('div', {className:'welcome-title'}, 'Welcome to Stackless v4'),
              h('div', {className:'welcome-text'},
                'Edit prices, tiers, and customers — everything auto-saves locally. ',
                'New in v4: the ', h('strong', null, '👤 Customer View'), ' tab shows exactly what each B2B customer sees — their personalized prices with all discounts applied. ',
                'Use ', h('strong', null, '⤴ Deploy'), ' to push live, or ', h('kbd', null, '⌘'), h('kbd', null, 'K'), ' to jump anywhere.'
              )
            ),
            h('button', {className:'welcome-close', onClick:dismissWelcome, title:'Dismiss'}, '×')
          ) : null,
          h('div', {className:'content', key:page+initSearch},
            page === 'overview' && h(OverviewPage, {products:prods, variations:vars, users:users}),
            page === 'pricing' && h(PricingPage, {
              prods:prods, vars:vars, initSearch:initSearch,
              onSync:function(t,np,nv){if(t==='p'&&np)setProds(np);if(t==='v'&&nv)setVars(nv);}
            }),
            page === 'users' && h(UsersPage, {
              initUsers:users, initSearch:initSearch,
              onSync:function(nu){setUsers(nu);}
            }),
            page === 'customer' && h(CustomerViewPage, {products:prods, variations:vars, users:users}),
            page === 'deploy' && h(DeployPage, {products:prods, variations:vars, users:users}),
            page === 'export' && h(ExportPage, {products:prods, variations:vars, users:users})
          )
        ),
        showDataMgr && h('div', {className:'overlay', onClick:function(){setShowDataMgr(false);}},
          h('div', {className:'panel dm-panel', onClick:function(e){e.stopPropagation();}},
            h('div', {className:'p-head'},
              h('div', null, h('span', {className:'p-title'}, 'Data Management')),
              h('button', {className:'cls', onClick:function(){setShowDataMgr(false);}}, '\u00d7')
            ),
            h('div', {className:'p-body'},
              h('div', {className:'dm-status'},
                h('div', {className:'dm-icon'}, lastSaved ? '\u2713' : '\u25cb'),
                h('div', null,
                  h('div', {className:'dm-label'}, lastSaved ? 'Auto-Save Active' : 'Not Yet Saved'),
                  lastSaved ? h('div', {className:'dm-time'}, 'Last saved: ' + new Date(lastSaved).toLocaleString()) : h('div', {className:'dm-time'}, 'Changes will auto-save to browser storage')
                )
              ),
              h('div', {className:'dm-info'}, 'Your edits auto-save to this browser. They persist across page reloads. Use Export to create a backup file you can share or restore later.'),
              h('div', {className:'dm-section'},
                h('div', {className:'fld-l'}, 'Backup'),
                h('button', {className:'btn-f btn-save', style:{marginBottom:'8px'}, onClick:function(){
                  exportJSON(prods, vars, users);
                }}, '\u2b07 Export JSON Backup'),
                h('label', {className:'btn-f btn-ghost', style:{cursor:'pointer',textAlign:'center',border:'1px dashed var(--border2)',display:'block'}},
                  '\u2b06 Import JSON Backup',
                  h('input', {type:'file', accept:'.json', style:{display:'none'}, onChange:function(e){
                    if (e.target.files[0]) {
                      importJSON(e.target.files[0], function(err, data) {
                        if (err) { alert(err); return; }
                        if (confirm('Replace all current data with imported data? (' + data.products.length + ' products, ' + Object.keys(data.users).length + ' users)')) {
                          setProds(data.products);
                          setVars(data.variations);
                          setUsers(data.users);
                          setShowDataMgr(false);
                        }
                      });
                    }
                  }})
                )
              ),
              h('div', {className:'dm-section'},
                h('div', {className:'fld-l'}, 'Reset'),
                h('button', {className:'btn-f btn-del', onClick:function(){
                  if (confirm('Reset ALL data to factory defaults? This will discard all your edits.')) {
                    clearSaved();
                    setProds(PRODUCTS.slice());
                    setVars(VARIATIONS.slice());
                    setUsers(Object.assign({}, USERS));
                    setLastSaved(null);
                    setShowDataMgr(false);
                  }
                }}, 'Reset to Factory Defaults')
              ),
              h('div', {className:'dm-stats'},
                h('div', {className:'dm-stat'}, h('span', null, 'Products'), h('strong', null, prods.length)),
                h('div', {className:'dm-stat'}, h('span', null, 'Variations'), h('strong', null, vars.length)),
                h('div', {className:'dm-stat'}, h('span', null, 'Users'), h('strong', null, Object.keys(users).length)),
                h('div', {className:'dm-stat'}, h('span', null, 'Storage'), h('strong', null, (JSON.stringify({p:prods,v:vars,u:users}).length / 1024).toFixed(0) + ' KB'))
              )
            )
          )
        ),
        showCmd && h(CmdPalette, {
          products:prods, users:users,
          onSelect:handleCmdSelect,
          onClose:function(){setShowCmd(false);}
        })
      );
    }

    // ─── INIT ───
    var _root = null;
    function mountApp() {
      document.getElementById('loading').classList.add('hidden');
      var el = document.getElementById('root');
      if (!_root) {
        // React 18 createRoot API
        if (ReactDOM.createRoot) {
          _root = ReactDOM.createRoot(el);
          _root.render(h(App));
        } else {
          // Fallback for React 17
          ReactDOM.render(h(App), el);
        }
      }
    }
    window.addEventListener('load', mountApp);
    setTimeout(function() {
      if (document.getElementById('root').children.length === 0) mountApp();
    }, 150);
  </script>
</body>
</html>
